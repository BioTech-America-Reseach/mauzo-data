<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. William Series | AI Command Center</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/js/all.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        
        body { font-family: 'Space Grotesk', sans-serif; background-color: #000; color: #fff; padding-bottom: 100px; }
        .gold-glow { color: #FFD700; text-shadow: 0 0 15px rgba(255, 215, 0, 0.4); }
        .glass { background: rgba(15, 15, 15, 0.9); backdrop-filter: blur(15px); border: 1px solid rgba(255, 215, 0, 0.1); }
        .ai-chat-bubble { border-radius: 20px 20px 0 20px; background: rgba(255, 215, 0, 0.05); border: 1px solid rgba(255, 215, 0, 0.1); }
        .user-chat-bubble { border-radius: 20px 20px 20px 0; background: rgba(255, 255, 255, 0.05); }
        
        /* Animated AI Ring */
        .ai-ring {
            width: 50px; height: 50px;
            border-radius: 50%;
            border: 2px solid transparent;
            border-top-color: #FFD700;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .active-view { display: block !important; }
        .section-view { display: none; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <!-- Top Navigation & Audit Alert -->
    <header class="p-6 border-b border-yellow-500/10 sticky top-0 bg-black z-50 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-black gold-glow tracking-tighter">DR. WILLIAM SERIES</h1>
            <p id="ai-auditor-msg" class="text-[8px] font-bold text-green-500 uppercase tracking-widest animate-pulse">
                <i class="fas fa-brain"></i> Pacha Kodi AI: Auditing Live...
            </p>
        </div>
        <button onclick="toggleAIChat()" class="relative">
            <div id="ai-loading" class="hidden absolute -top-1 -right-1 ai-ring scale-50"></div>
            <i class="fas fa-robot text-2xl gold-glow"></i>
        </button>
    </header>

    <main class="p-4 max-w-4xl mx-auto">

        <!-- AI API KEY SETTINGS (Kuficha hii baada ya kuweka) -->
        <div id="api-config" class="glass p-4 rounded-2xl mb-6">
            <p class="text-[10px] font-bold text-yellow-500 mb-2 uppercase">AI Configuration (API Key)</p>
            <div class="flex gap-2">
                <input id="api-key" type="password" class="flex-1 bg-black border border-yellow-500/20 rounded-lg p-2 text-xs outline-none" placeholder="Ingiza OpenAI API Key hapa...">
                <button onclick="saveApiKey()" class="bg-yellow-500 text-black px-4 py-2 rounded-lg font-bold text-[10px]">SAVE</button>
            </div>
        </div>

        <!-- Dashboard Intelligence Summary -->
        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="glass p-5 rounded-[30px] border-l-4 border-yellow-500">
                <p class="text-[9px] font-bold text-gray-500 uppercase">Sales Series</p>
                <h2 id="summary-sales" class="text-xl font-black">0</h2>
                <canvas id="miniChart" height="50"></canvas>
            </div>
            <div class="glass p-5 rounded-[30px] border-l-4 border-red-500">
                <p class="text-[9px] font-bold text-gray-500 uppercase">Risk Level</p>
                <h2 id="summary-risk" class="text-xl font-black text-green-500">LOW</h2>
                <div class="h-1 bg-gray-800 rounded-full mt-2"><div id="risk-bar" class="h-full bg-green-500 rounded-full w-10%"></div></div>
            </div>
        </div>

        <!-- AI CHAT CENTER (THE BRAIN) -->
        <div id="ai-chat-panel" class="glass rounded-[30px] overflow-hidden flex flex-col h-[400px] mb-6">
            <div class="p-4 border-b border-white/5 bg-white/5 flex justify-between">
                <span class="text-xs font-bold gold-glow italic">PACHA KODI AI COMMANDER</span>
                <i class="fas fa-microchip text-gray-600"></i>
            </div>
            <div id="chat-messages" class="flex-1 p-4 overflow-y-auto space-y-4 text-sm">
                <div class="ai-chat-bubble p-3 max-w-[80%]">
                    Habari Dr. William! Mimi ni Pacha Kodi AI. Nimeishasoma data zako zote. Una swali lolote kuhusu biashara yako leo?
                </div>
            </div>
            <div class="p-4 border-t border-white/5 flex gap-2">
                <input id="ai-input" class="flex-1 bg-transparent border-none outline-none text-sm" placeholder="Uliza chochote...">
                <button onclick="askAI()" class="gold-glow"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>

        <!-- Sections (Stock, Sales, Expenses) -->
        <div id="view-stock" class="section-view glass p-6 rounded-[30px]">
            <h2 class="text-xl font-bold gold-glow mb-4 uppercase">Stoo Intelligence</h2>
            <div id="stock-list" class="space-y-3">
                <!-- Stock loaded here -->
            </div>
            <button onclick="addStockPrompt()" class="mt-4 w-full border border-yellow-500/20 py-3 rounded-xl text-xs uppercase">+ Weka Stock Manual</button>
        </div>

    </main>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 w-full glass h-20 flex justify-around items-center px-4 z-[60]">
        <button onclick="showView('stock')"><i class="fas fa-boxes text-xl"></i></button>
        <button onclick="showView('sales')" class="gold-glow"><i class="fas fa-shopping-cart text-xl"></i></button>
        <button onclick="showView('expenses')"><i class="fas fa-wallet text-xl"></i></button>
    </nav>

    <script>
        // Database Core
        let db = JSON.parse(localStorage.getItem('dw_ultimate_db')) || {
            sales: [], expenses: [], stock: {}, apiKey: ""
        };

        const synth = window.speechSynthesis;
        let miniChart;

        window.onload = () => {
            if (db.apiKey) document.getElementById('api-config').classList.add('hidden');
            initCharts();
            updateIntelligence();
            showView('stock');
        };

        function showView(view) {
            document.querySelectorAll('.section-view').forEach(v => v.classList.remove('active-view'));
            document.getElementById(`view-${view}`)?.classList.add('active-view');
        }

        function saveApiKey() {
            const key = document.getElementById('api-key').value;
            if (key) {
                db.apiKey = key;
                saveDB();
                alert("API Key imehifadhiwa!");
                document.getElementById('api-config').classList.add('hidden');
            }
        }

        function initCharts() {
            const ctx = document.getElementById('miniChart').getContext('2d');
            miniChart = new Chart(ctx, {
                type: 'line',
                data: { labels: [1,2,3,4,5], datasets: [{ data: [0,0,0,0,0], borderColor: '#FFD700', borderWidth: 2, pointRadius: 0 }] },
                options: { scales: { x:{display:false}, y:{display:false} }, plugins:{legend:{display:false}} }
            });
        }

        function updateIntelligence() {
            const totalSales = db.sales.reduce((a, b) => a + b.amount, 0);
            document.getElementById('summary-sales').innerText = "TZS " + totalSales.toLocaleString();
            
            // Render Stock
            const stockDiv = document.getElementById('stock-list');
            stockDiv.innerHTML = Object.keys(db.stock).map(name => `
                <div class="flex justify-between p-3 border-b border-white/5">
                    <span>${name}</span>
                    <span class="gold-glow font-bold">${db.stock[name].qty}</span>
                </div>
            `).join('');
        }

        // AI INTEGRATION ENGINE
        async function askAI() {
            const input = document.getElementById('ai-input').value;
            if (!input || !db.apiKey) {
                alert("Ingiza API Key kwanza au swali lako!");
                return;
            }

            addChatMessage(input, 'user');
            document.getElementById('ai-input').value = "";
            document.getElementById('ai-loading').classList.remove('hidden');

            const systemPrompt = `
                Wewe ni Pacha Kodi AI, mhasibu na auditor mtaalamu wa Dr. William Series.
                Hizi hapa ni data za biashara kwa sasa:
                - Stoo: ${JSON.stringify(db.stock)}
                - Mauzo: ${JSON.stringify(db.sales.slice(0,10))}
                - Gharama: ${JSON.stringify(db.expenses.slice(0,10))}
                
                Jibu kwa Kiswahili fasaha. Kuwa mwerevu, gundua wizi, toa ushauri wa faida, na uchambue data hizi.
            `;

            try {
                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${db.apiKey}`
                    },
                    body: JSON.stringify({
                        model: "gpt-3.5-turbo", // Unaweza kuweka gpt-4
                        messages: [
                            { role: "system", content: systemPrompt },
                            { role: "user", content: input }
                        ],
                        temperature: 0.7
                    })
                });

                const data = await response.json();
                const aiReply = data.choices[0].message.content;
                addChatMessage(aiReply, 'ai');
                speak(aiReply);
            } catch (error) {
                addChatMessage("Samahani Dr. William, kuna hitilafu ya kuunganishwa na seva za AI.", 'ai');
            } finally {
                document.getElementById('ai-loading').classList.add('hidden');
            }
        }

        function addChatMessage(msg, sender) {
            const chatDiv = document.getElementById('chat-messages');
            const bubble = document.createElement('div');
            bubble.className = sender === 'ai' ? 'ai-chat-bubble p-3 max-w-[85%]' : 'user-chat-bubble p-3 max-w-[85%] ml-auto text-right';
            bubble.innerText = msg;
            chatDiv.appendChild(bubble);
            chatDiv.scrollTop = chatDiv.scrollHeight;
        }

        function addStockPrompt() {
            const name = prompt("Jina la Bidhaa:");
            const qty = prompt("Idadi:");
            const price = prompt("Bei ya kila moja:");
            if(name && qty) {
                db.stock[name] = { qty: parseInt(qty), price: parseInt(price) };
                saveDB();
                updateIntelligence();
            }
        }

        function speak(text) {
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'sw-TZ';
            synth.speak(utter);
        }

        function saveDB() { localStorage.setItem('dw_ultimate_db', JSON.stringify(db)); }
    </script>
</body>
</html>
