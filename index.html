<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <title>Jawiza Pro V3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .modal { display: none; position: fixed; z-index: 50; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); }
        .modal-content { background: #1f2937; margin: 5% auto; padding: 20px; width: 90%; max-width: 800px; border-radius: 15px; color: white; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans p-4">

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
        <div class="bg-gray-800 p-6 rounded-2xl border border-gray-700 cursor-pointer" onclick="openModal('mauzoModal')">
            <h2 class="text-gray-400">Mauzo</h2>
            <p id="lblMauzo" class="text-3xl font-bold text-green-400">Tsh 0</p>
        </div>
        <div class="bg-gray-800 p-6 rounded-2xl border border-gray-700 cursor-pointer" onclick="openModal('matumiziModal')">
            <h2 class="text-gray-400">Matumizi</h2>
            <p id="lblMatumizi" class="text-3xl font-bold text-yellow-400">Tsh 0</p>
        </div>
        <div class="bg-gray-800 p-6 rounded-2xl border border-gray-700 cursor-pointer" onclick="openModal('stockModal')">
            <h2 class="text-gray-400">Stoki (Bonyeza kuhariri)</h2>
            <div id="stockListDisplay" class="text-sm"></div>
        </div>
    </div>

    <div id="stockModal" class="modal">
        <div class="modal-content">
            <h2 class="text-xl mb-4 font-bold">Hariri Stoki</h2>
            <div id="stockEditor" class="space-y-2"></div>
            <button onclick="closeModal('stockModal')" class="mt-4 bg-red-600 px-4 py-2 rounded">Funga</button>
        </div>
    </div>

    <div id="matumiziModal" class="modal">
        <div class="modal-content">
            <h2 class="text-xl mb-4">Ongeza Matumizi</h2>
            <input id="descMatumizi" type="text" placeholder="Maelezo" class="w-full bg-gray-700 p-2 mb-2 rounded">
            <input id="kisiMatumizi" type="number" placeholder="Kiasi" class="w-full bg-gray-700 p-2 mb-2 rounded">
            <button onclick="sajiliMatumizi()" class="bg-yellow-600 px-4 py-2 rounded">Sajili</button>
            <button onclick="closeModal('matumiziModal')" class="ml-2 bg-gray-600 px-4 py-2 rounded">Funga</button>
        </div>
    </div>

    <script>
        let data = { mauzo: [], matumizi: [], stocks: { chupa: { idadi: 20, bei: 3000 }, sementi: { idadi: 50, bei: 15000 } } };

        function updateUI() {
            // Update Stoki Display
            let html = "";
            for(let key in data.stocks) {
                html += `<div class="flex justify-between border-b border-gray-700 py-1" onclick="editStock('${key}')">
                            <span>${key}</span> <span class="font-bold text-green-400">${data.stocks[key].idadi}</span>
                         </div>`;
            }
            document.getElementById('stockListDisplay').innerHTML = html;
        }

        function editStock(key) {
            let newQty = prompt(`Badilisha idadi ya ${key}:`, data.stocks[key].idadi);
            if(newQty !== null) {
                data.stocks[key].idadi = parseInt(newQty);
                updateUI();
            }
        }

        function sajiliMatumizi() {
            let desc = document.getElementById('descMatumizi').value;
            let amount = document.getElementById('kisiMatumizi').value;
            data.matumizi.push({desc, amount, time: new Date().toLocaleTimeString()});
            document.getElementById('lblMatumizi').innerText = "Tsh " + data.matumizi.reduce((a,b) => a + parseInt(b.amount), 0);
            alert("Matumizi yamesajiliwa!");
            closeModal('matumiziModal');
        }

        function openModal(id) { document.getElementById(id).style.display = "block"; }
        function closeModal(id) { document.getElementById(id).style.display = "none"; }

        // Initialize
        updateUI();
    </script>
</body>
</html>
